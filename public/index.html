<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --playing-color: #22c55e;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .category {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .soundboard-categories {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .category-header {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .category-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            width: 800px;
        }

        .mode-view {
            .mode-edit-btn {
                display: block;
            }
            .mode-view-btn,
            .new-category-btn,
            .delete-btn,
            .save-btn,
            .load-btn,
            .reset-btn {
                display: none;
            }
        }

        .mode-edit {
            .mode-edit-btn {
                display: none;
            }
            .mode-view-btn,
            .new-category-btn,
            .delete-btn,
            .save-btn,
            .load-btn,
            .reset-btn  {
                display: block;
            }
        }


        .delete-btn {
            position: absolute;
            left: 100%;
            margin-left: 1rem;
        }

        .sound-btn,
        #general-actions button,
        .delete-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 1.5rem 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .sound-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .sound-btn:active {
            transform: translateY(0);
        }

        .button-ghost {
          opacity: 0.4;
          background-color: #cbd5e1;
        }

        .sound-btn * {
            pointer-events: none;
        }

        /* Dynamic visual feedback states */
        .sound-btn.playing {
            border-color: var(--playing-color);
            background-color: #052e16;
            animation: pulse 1.5s infinite;
        }

        .delete-btn {
        }

        #general-actions {
            width: 800px;
            display: flex;
            flex-direction: row;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>

    <h1>Soundboard</h1>

    <div class="mode-view" id="general-actions">
        <button class="stop-btn" onclick="stop()">🛑 Stop all sounds</button>
        <button class="mode-edit-btn" onclick="toggleEdit()">✏️ Edit</button>
        <button class="mode-view-btn" onclick="toggleView()">👁️ View</button>
        <button class="new-category-btn" onclick="newCategory()">➕ New category</button>
        <button class="save-btn" onclick="saveSoundboardRemote()">💾 Save layout</button>
        <button class="load-btn" onclick="loadSoundboardRemote()">📂 Load layout</button>
        <button class="reset-btn" onclick="resetLayout()">↩️ Reset layout</button>

    </div>

    <div class="soundboard-categories mode-view" id="categories">
    </div>

    <script src=" https://cdn.jsdelivr.net/npm/sortablejs@1.15.7/Sortable.min.js "></script>
    <script>

        const defaultStructure = [
            {
                name: 'Deutsche Memes',
                entries: [
                    'Alarm',
                    'Alpecin',
                    'Halt Stop',
                    'Ich hab garnichts gemacht',
                    'Ich habe fertig - Trapattoni',
                    'Ich muss raus',
                    'Jorge drei',
                    'Kann es sein dass du dumm bist oder sowas',
                    'Nicht so tief Rüdiger',
                    'Schauen wir mal was wird',
                    'Was ist denn mit Karsten los',
                    'Was machen Sachen',
                    'Ich bin der Uwe und ich bin auch dabei'
                ]
            }
        ];
        let mode = 'view';
        const sortables = [];

        function renderButton(file, alias) {
            const button = document.createElement('button');
            button.className = 'sound-btn';
            button.draggable = mode === 'edit';
            // Strip extensions like .ogg or .wav for a cleaner UI button label
            button.innerText = alias ?? file.replace(/\.[^/.]+$/, '');
            button.dataset.file = file;
            button.onclick = () => buttonClick(file, button);
            return button;
        }

        function entryFile(entry) {
            let file;
            if (typeof entry === 'string') {
                file = entry;
            } else if (typeof entry === 'object') {
                file = entry?.file;
            }
            if (!file.endsWith('.ogg')) {
                file = file + '.ogg';
            }
            return file;
        }

        function renderCategoryHeader(categoryName, categoryDiv) {
            const categoryHeaderDiv = document.createElement('div');
            categoryHeaderDiv.classList.add('category-header')
            const categoryHeaderText = document.createElement('h2');
            categoryHeaderText.innerText = categoryName;
            categoryHeaderText.onclick = () => renameCategory(categoryHeaderText);
            categoryHeaderDiv.append(categoryHeaderText);
            const deleteButton = document.createElement('button');
            deleteButton.classList.add('delete-btn');
            deleteButton.innerText = '🗑️ Delete';
            deleteButton.onclick = () => deleteCategory(categoryDiv);
            categoryHeaderDiv.append(deleteButton);
            return categoryHeaderDiv;
        }

        function renderCategory(categoryName, categoryFiles) {
            const categoryDiv = document.createElement('div');
            categoryDiv.classList.add('category');
            const categoryHeader = renderCategoryHeader(
                categoryName, categoryDiv);
            categoryDiv.append(categoryHeader);
            const categoryButtonsDiv = document.createElement('div');
            categoryButtonsDiv.classList.add('category-buttons');
            for (const entry of categoryFiles) {
                let file = entryFile(entry);
                let alias;
                if (typeof entry === 'object') {
                    alias = entry?.alias;
                }
                categoryButtonsDiv.append(renderButton(file, alias));
            }
            categoryDiv.append(categoryButtonsDiv);
            sortables.push(new Sortable(categoryButtonsDiv, {
                group: 'sound-btn',
                animation: 150,
                ghostClass: 'button-ghost',
                onEnd: saveSoundboard
            }));
            return categoryDiv
        }

        function renderStructuredFiles(files, structure) {
            let remainingFiles = [...files];
            const categoriesDiv = document.getElementById('categories');
            for (const category of structure) {
                const categoryDiv = renderCategory(category.name, category.entries);
                for (const entry of category.entries) {
                    const file = entryFile(entry);
                    remainingFiles = remainingFiles.filter(f => f !== file);
                }
                categoriesDiv.append(categoryDiv);
            }
            return remainingFiles;
        }

        function renderDefaultFiles(files) {
            const categoriesDiv = document.getElementById('categories');
            const categoryDiv = renderCategory('Unkategorisiert', files);
            categoriesDiv.append(categoryDiv);
        }

        async function playSound(file, buttonElement) {
            // Add playing class for user feedback
            buttonElement.classList.add('playing');
            try {
                const response = await fetch(`./api/play/${file}`, {
                    method: 'POST'
                });
                if (!response.ok) throw new Error('Playback rejected by server');
            } catch (err) {
                console.error('Playback execution error:', err);
                buttonElement.style.borderColor = '#ef4444'; // Red error border fallback
            } finally {
                // Remove the active UI glow state once the server confirms deployment
                // (Or when the track finishes, depending on your endpoint design)
                setTimeout(() => buttonElement.classList.remove('playing'), 1000);
            }
        }

        async function renameButton(buttonElement) {
            const newName = prompt(
                'New sound name',
                buttonElement.innerText)?.trim();
            if (newName) {
                buttonElement.innerText = newName;
            }
            await saveSoundboard();
        }

        async function buttonClick(file, buttonElement) {
            if (mode === 'view') {
                await playSound(file, buttonElement);
            } else if (mode === 'edit') {
                renameButton(buttonElement);
            }
        }

        async function stop() {
            const response = await fetch('./api/panic', {
                method: 'POST'
            });
            if (!response.ok) throw new Error('Failed to stop playback');
        }

        async function renameCategory(categoryHeaderText) {
            if (mode !== 'edit') {
                return;
            }
            const newName = prompt(
                'New category name',
                categoryHeaderText.innerText)?.trim();
            if (newName) {
                categoryHeaderText.innerText = newName;
            }
            await saveSoundboard();
        }

        async function newCategory() {
            const name = prompt('New category name');
            const categoriesDiv = document.getElementById('categories');
            const categoryDiv = renderCategory(name, []);
            categoriesDiv.prepend(categoryDiv);
            await saveSoundboard();
        }

        async function deleteCategory(categoryDiv) {
            categoryDiv.remove();
            await saveSoundboard();
        }

        async function resetLayout() {
            const result = confirm('Are you sure you want to rest? This can\'t be undone');
            if (!result) {
                return;
            }
            localStorage.removeItem('config');
            const categoriesDiv = document.getElementById('categories');
            categoriesDiv.innerHTML = '';
            await loadSoundboard();
        }

        function toggleEdit() {
            const categoriesDiv = document.getElementById('categories');
            const generalActionsDiv = document.getElementById('general-actions');
            for (const div of [categoriesDiv, generalActionsDiv]) {
                div.classList.remove('mode-view');
                div.classList.add('mode-edit');
            }
            for (const sortable of sortables) {
                sortable.option('disabled', false);
            }
            for (const button of document.querySelectorAll('.sound-btn')) {
                button.draggable = true;
            }
            mode = 'edit';
        }

        function toggleView() {
            const categoriesDiv = document.getElementById('categories');
            const generalActionsDiv = document.getElementById('general-actions');
            for (const div of [categoriesDiv, generalActionsDiv]) {
                div.classList.remove('mode-edit');
                div.classList.add('mode-view');
            }
            for (const sortable of sortables) {
                sortable.option('disabled', true);
            }
            for (const button of document.querySelectorAll('.sound-btn')) {
                button.draggable = false;
            }
            mode = 'view';
        }

        function readConfig() {
            const categoryDivs = document.querySelectorAll('.category');
            const structure = [];
            for (const category of categoryDivs) {
                const name = category.children[0].children[0].innerText;
                let entries = [...category.children[1].children];
                entries = entries.map(e => {
                    return {
                        file: e.dataset.file,
                        alias: e.innerText,
                    };
                });
                structure.push({
                    name,
                    entries
                })
            }
            return JSON.stringify(structure);
        }

        function saveSoundboard() {
            localStorage.setItem('config', readConfig());
        }

        async function loadSoundboard() {
            try {
                const savedData = localStorage.getItem('config');
                const structure = savedData
                    ? JSON.parse(savedData)
                    : defaultStructure;
                const response = await fetch('./api/sounds');
                let files = await response.json();
                files = renderStructuredFiles(files, structure);
                if (files.length > 0) {
                    renderDefaultFiles(files);
                }
                const categoriesDiv = document.querySelector('#categories');
                const categoryDivs = document.querySelectorAll('.category');
                sortables.push(new Sortable(categoriesDiv, {
                    group: 'category',
                    animation: 150,
                    ghostClass: 'button-ghost',
                    onEnd: saveSoundboard
                }));
                for (const sortable of sortables) {
                    sortable.option('disabled', true);
                }
            } catch (err) {
                console.error('Failed to load soundboard inventory:', err);
            }
        }


        async function saveSoundboardRemote() {
            const result = confirm('Are you sure you want save config on remote? This can\'t be undone');
            if (!result) {
                return;
            }
            await fetch('./api/config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: readConfig()
            });
        }

        async function loadSoundboardRemote() {
            const result = confirm('Are you sure you want to load remote config? This can\'t be undone');
            if (!result) {
                return;
            }
            const response = await fetch('./api/config');
            const structure = await response.json();
            localStorage.setItem('config', JSON.stringify(structure));
            const categoriesDiv = document.getElementById('categories');
            categoriesDiv.innerHTML = '';
            await loadSoundboard();
        }

        window.onload = loadSoundboard;
    </script>
</body>

</html>
